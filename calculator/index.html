<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="calculator-card">

        <h1> Scientific Calculator </h1>

        <input type="text" id="display" readonly>

        <div class="buttons">

            <!-- Scientific -->

            <button class="special" onclick="append('sin(')">sin°</button>
            <button class="special" onclick="append('cos(')">cos°</button>
            <button class="special" onclick="append('tan(')">tan°</button>
            <button class="special" onclick="append('Math.PI')">π</button>

            <button class="special" onclick="append('sqrt(')">√</button>
            <button class="special" onclick="append('**')">xʸ</button>
            <button class="special" onclick="append('**2')">x²</button>
            <button class="delete" onclick="deleteChar()">⌫</button>

            <!-- Operators -->

            <button class="operator" onclick="clearDisplay()">AC</button>
            <button class="operator" onclick="append('%')">%</button>
            <button class="operator" onclick="append('/')">÷</button>
            <button class="operator" onclick="append('*')">×</button>

            <!-- Numbers -->

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="operator" onclick="append('-')">−</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="operator" onclick="append('+')">+</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button class="equal" onclick="calculate()">=</button>

            <button class="zero" onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
